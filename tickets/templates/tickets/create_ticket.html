{% extends "tickets/base.html" %}

{% block title %}New Ticket | University Support{% endblock %}
{% block page_title %}New Support Ticket{% endblock %}

{% block content %}
{% if error %}
    <div class="alert alert-danger">{{ error }}</div>
{% endif %}

<section class="surface">
    <form method="post">
        {% csrf_token %}

        <div class="row g-3">
            <div class="col-12">
                <label class="form-label" for="title">Title</label>
                <input id="title" type="text" name="title" class="form-control" required>
            </div>

            <div class="col-md-6">
                <label class="form-label" for="unit">Unit</label>
                <select id="unit" name="unit" class="form-select" required>
                    <option value="">Select unit</option>
                    {% for unit in units %}
                        <option value="{{ unit.id }}">{{ unit.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label" for="topic">Topic</label>
                <select id="topic" name="topic" class="form-select" required>
                    <option value="">Select topic</option>
                    {% for topic in topics %}
                        <option value="{{ topic.id }}">{{ topic.unit.name }} - {{ topic.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-4">
                <label class="form-label" for="priority">Priority</label>
                <select id="priority" name="priority" class="form-select" required>
                    <option value="">Select priority</option>
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
            </div>

            <div class="col-12">
                <label class="form-label" for="description">Description</label>
                <textarea id="description" name="description" class="form-control" rows="6" required></textarea>
            </div>

            <div class="col-12">
                <button type="submit" class="btn btn-primary">Submit ticket</button>
                <a href="/api/ui/tickets/" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </div>
    </form>
</section>
{% endblock %}
