<!DOCTYPE html>
<html>
<head>
    <title>Create Ticket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="text-white p-3" style="width:250px; min-height:100vh; background-color:#0d3b66;">
        <h4 class="mb-4">University Support</h4>

        <a href="/api/ui/dashboard/" class="btn btn-outline-light w-100 mb-2">Dashboard</a>
        <a href="/api/ui/units/" class="btn btn-outline-light w-100 mb-2">Units</a>
        <a href="/api/ui/tickets/" class="btn btn-outline-light w-100 mb-2">Tickets</a>
        <a href="/api/ui/tickets/create/" class="btn btn-light w-100 mb-2">Create Ticket</a>
    </div>

    <!-- MAIN -->
    <div class="flex-grow-1 p-4">

        <!-- TOP BAR -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Create Support Ticket</h1>

            <div class="d-flex align-items-center">
                <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
                     class="me-2 border rounded"
                     width="45" height="45">

                <span class="me-3 fw-bold">
                    {{ request.user.username|default:"Guest" }}
                </span>

                <a href="/admin/logout/" class="btn btn-outline-danger btn-sm">Logout</a>
            </div>
        </div>

        <!-- FORM -->
        <div class="card p-4 shadow-sm">
            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Title</label>
                    <input type="text" name="title" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="4"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Unit</label>
                    <select name="unit" class="form-control">
                        {% for unit in units %}
                            <option value="{{ unit.id }}">{{ unit.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Topic</label>
                    <select name="topic" class="form-control">
                        {% for topic in topics %}
                            <option value="{{ topic.id }}">{{ topic.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Priority</label>
                    <select name="priority" class="form-control">
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary">Create Ticket</button>
            </form>
        </div>

    </div>

</div>

</body>
</html>
