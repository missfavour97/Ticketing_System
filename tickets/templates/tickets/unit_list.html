<!DOCTYPE html>
<html>
<head>
    <title>Units</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="text-white p-3" style="width:250px; min-height:100vh; background-color:#0d3b66;">
        <h4 class="mb-4">University Support</h4>

        <a href="/api/ui/dashboard/" class="btn btn-outline-light w-100 mb-2">Dashboard</a>
        <a href="/api/ui/units/" class="btn btn-light w-100 mb-2">Units</a>
        <a href="/api/ui/tickets/" class="btn btn-outline-light w-100 mb-2">Tickets</a>
        <a href="/api/ui/tickets/create/" class="btn btn-outline-light w-100 mb-2">Create Ticket</a>
    </div>

    <!-- MAIN -->
    <div class="flex-grow-1 p-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>University Units</h1>

            <div class="d-flex align-items-center">
                <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
                     class="me-2 border rounded"
                     width="45" height="45">

                <span class="me-3 fw-bold">
                    {{ request.user.username|default:"Guest" }}
                </span>

                <a href="/api/logout/" class="btn btn-outline-danger btn-sm">Logout</a>
            </div>
        </div>

        {% if units %}
            {% for unit in units %}
                <div class="card mb-3 p-3 shadow-sm">
                    <h5>{{ unit.name }}</h5>
                    <p>{{ unit.description }}</p>
                </div>
            {% endfor %}
        {% else %}
            <p>No units available.</p>
        {% endif %}

    </div>

</div>

</body>
</html>
