<!DOCTYPE html>
<html>
<head>
    <title>University Support Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="text-white p-3" style="width: 250px; min-height: 100vh; background-color:#0d3b66;">
        <h4 class="mb-4">University Support</h4>

        <a href="/api/ui/dashboard/" class="btn btn-light w-100 mb-2">Dashboard</a>
        <a href="/api/ui/units/" class="btn btn-outline-light w-100 mb-2">Units</a>
        <a href="/api/ui/tickets/" class="btn btn-outline-light w-100 mb-2">Tickets</a>
        <a href="/api/ui/tickets/create/" class="btn btn-outline-light w-100 mb-2">Create Ticket</a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="flex-grow-1 p-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>University Support Dashboard</h1>

            <div>
                <span class="me-3">
                    Profile: {{ request.user.username|default:"Guest" }}
                </span>
                <a href="/admin/logout/" class="btn btn-outline-danger btn-sm">Logout</a>
            </div>
        </div>

        <div class="row">

            <div class="col-md-4">
                <div class="card p-3 text-center shadow-sm">
                    <h3>{{ total_units }}</h3>
                    <p>Units</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3 text-center shadow-sm">
                    <h3>{{ total_topics }}</h3>
                    <p>Topics</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3 text-center shadow-sm">
                    <h3>{{ total_tickets }}</h3>
                    <p>Tickets</p>
                </div>
            </div>

        </div>

    </div>

</div>

</body>
</html>
