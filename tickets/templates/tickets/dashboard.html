<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h1 class="mb-4">Dashboard</h1>

    <div class="mb-3">
        <a href="/api/ui/tickets/" class="btn btn-outline-secondary">Tickets</a>
        <a href="/api/ui/units/" class="btn btn-outline-secondary">Units</a>
        <a href="/api/ui/tickets/create/" class="btn btn-primary">Create Ticket</a>
    </div>

    <div class="row">

        <div class="col-md-4">
            <div class="card p-3 text-center">
                <h3>{{ total_units }}</h3>
                <p>Units</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 text-center">
                <h3>{{ total_topics }}</h3>
                <p>Topics</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 text-center">
                <h3>{{ total_tickets }}</h3>
                <p>Tickets</p>
            </div>
        </div>

    </div>

</div>

</body>
</html>
