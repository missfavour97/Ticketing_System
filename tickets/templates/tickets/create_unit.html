{% extends "tickets/base.html" %}

{% block title %}New Unit | University Support{% endblock %}
{% block page_title %}New Support Unit{% endblock %}

{% block content %}
<section class="surface">
    <form method="post">
        {% csrf_token %}

        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label" for="name">Name</label>
                <input id="name" type="text" name="name" class="form-control" required>
            </div>

            <div class="col-md-6">
                <label class="form-label" for="parent">Parent unit</label>
                <select id="parent" name="parent" class="form-select">
                    <option value="">No parent</option>
                    {% for unit in units %}
                        <option value="{{ unit.id }}">{{ unit.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-12">
                <label class="form-label" for="description">Description</label>
                <textarea id="description" name="description" class="form-control" rows="5"></textarea>
            </div>

            <div class="col-12">
                <button type="submit" class="btn btn-primary">Create unit</button>
                <a href="/api/ui/units/" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </div>
    </form>
</section>
{% endblock %}
